                  example: Policy violation
                reasons:
                  type: array
                  items:
                    type: string
                    example: Inappropriate content
                  example:
                    - Inappropriate content
                rejectionCategories:
                  type: array
                  items:
                    type: string
                    example: Content
                  example:
                    - Content
                rejectionCategory:
                  type: string
                  example: Content
                rejectionSelections:
                  type: array
                  items:
                    type: object
                    properties:
                      category:
                        type: string
                        example: Content
                      reasons:
                        type: array
                        items:
                          type: string
                          example: Inappropriate content
                        example:
                          - Inappropriate content
                  example:
                    - category: Content
                      reasons:
                        - Inappropriate content
            examples:
              Reject Product:
                value:
                  customReason: ''
                  reason: Policy violation
                  reasons:
                    - Inappropriate content
                  rejectionCategories:
                    - Content
                  rejectionCategory: Content
                  rejectionSelections:
                    - category: Content
                      reasons:
                        - Inappropriate content
      responses:
        '200':
          description: ''
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: ''
